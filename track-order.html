<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Your Order | Burger King Ghana</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{
  --red:#D62300;--flame:#FF8732;--gold:#FFAA00;
  --peach:#EFE7DA;--dark:#2A1005;--dark2:#1A0800;
  --brown:#3D1C00;
  --ok:#3FB950;--warn:#FFAA00;--bad:#F85149;--info:#58A6FF;--faint:rgba(239,231,218,.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark2);color:var(--peach);font-family:"Libre Caslon Text",Georgia,serif;min-height:100vh;}
.wrap{max-width:560px;margin:0 auto;padding:50px 20px 80px;}
.logo-row{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:34px;}
.logo-row img{width:42px;height:42px;border-radius:9px;}
.logo-row span{font-weight:700;font-size:15px;letter-spacing:1.5px;}
h1{text-align:center;font-size:24px;margin-bottom:8px;}
.sub{text-align:center;color:rgba(239,231,218,.5);font-size:13px;margin-bottom:30px;}
.search-box{display:flex;gap:10px;margin-bottom:30px;}
.search-box input{
  flex:1;background:#221007;border:1.5px solid rgba(255,170,0,.16);color:var(--peach);
  padding:13px 16px;border-radius:8px;font-size:14px;font-family:"Space Mono",monospace;outline:none;
}
.search-box input:focus{border-color:var(--flame);}
.search-box button{
  background:var(--red);color:#fff;border:none;padding:13px 22px;border-radius:8px;
  font-weight:700;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;
}
.search-box button:hover{background:var(--flame);}
.search-box button:disabled{opacity:.5;cursor:not-allowed;}

#result{display:none;}
#result.show{display:block;}
.card{background:#221007;border:1px solid rgba(255,170,0,.14);border-radius:14px;padding:26px;}
.ref{font-family:"Space Mono",monospace;font-weight:700;font-size:20px;color:var(--gold);text-align:center;margin-bottom:18px;letter-spacing:1px;}

.status-track{display:flex;justify-content:space-between;margin:24px 0 30px;position:relative;}
.status-track::before{content:"";position:absolute;top:13px;left:5%;right:5%;height:2px;background:rgba(255,170,0,.14);}
.s-step{flex:1;text-align:center;position:relative;z-index:1;}
.s-dot{width:26px;height:26px;border-radius:50%;background:#150600;border:2px solid rgba(255,170,0,.25);margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--faint);}
.s-step.done .s-dot{background:var(--flame);border-color:var(--flame);color:#fff;}
.s-step.current .s-dot{background:var(--gold);border-color:var(--gold);color:#221007;box-shadow:0 0 0 4px rgba(255,170,0,.18);}
.s-label{font-size:9.5px;letter-spacing:.5px;color:var(--faint);text-transform:uppercase;}
.s-step.done .s-label,.s-step.current .s-label{color:var(--peach);}
.s-step.cancelled .s-dot{background:var(--bad);border-color:var(--bad);color:#fff;}

.detail-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:13px;}
.detail-row:last-child{border-bottom:none;}
.detail-row span:first-child{color:var(--faint);}
.detail-row span:last-child{font-weight:700;text-align:right;}

.err-box{
  background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.25);color:#ff8983;
  padding:16px;border-radius:10px;font-size:13px;text-align:center;display:none;
}
.err-box.show{display:block;}
.loading{text-align:center;color:var(--faint);font-size:13px;padding:20px;display:none;}
.loading.show{display:block;}
.foot-note{text-align:center;margin-top:30px;font-size:12px;color:rgba(239,231,218,.35);}
.foot-note a{color:var(--gold);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row"><img id="logoImg" alt="Burger King Ghana"/><span>BURGER KING GHANA</span></div>
  <h1>Track Your Order</h1>
  <p class="sub">Enter your order reference number to see its current status.</p>

  <div class="search-box">
    <input type="text" id="refInput" placeholder="FM-20260628-000001" autocomplete="off" onkeydown="if(event.key==='Enter')trackOrder()"/>
    <button id="trackBtn" onclick="trackOrder()">Track</button>
  </div>

  <div class="loading" id="loadingMsg">Looking up your order…</div>
  <div class="err-box" id="errBox"></div>

  <div id="result">
    <div class="card">
      <div class="ref" id="resultRef"></div>
      <div class="status-track" id="statusTrack"></div>
      <div id="resultDetails"></div>
    </div>
  </div>

  <p class="foot-note">Need help? Call or WhatsApp <a href="tel:+233244704066">0244 704 066</a></p>
</div>

document.getElementById("logoImg").src = LOGO_DATA_URI;

const STEPS = [
  { key: "pending", label: "Order Placed" },
  { key: "confirmed", label: "Confirmed" },
  { key: "preparing", label: "Preparing" },
  { key: "final", label: "Ready" }, // ready_for_pickup OR out_for_delivery
  { key: "completed", label: "Completed" },
];

function fmtMoney(n) { return "GH₵" + (Number(n) || 0).toFixed(2); }
function fmtDateTime(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" }) + " · " +
         d.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit", timeZone: "Africa/Accra" });
}
function escapeHtml(str) {
  if (str == null) return "";
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function stepIndexForStatus(status) {
  if (status === "ready_for_pickup" || status === "out_for_delivery") return 3;
  if (status === "completed") return 4;
  const idx = STEPS.findIndex((s) => s.key === status);
  return idx === -1 ? 0 : idx;
}

function renderStatusTrack(status) {
  const track = document.getElementById("statusTrack");
  if (status === "cancelled") {
    track.innerHTML = `<div class="s-step cancelled" style="flex:1;"><div class="s-dot">&times;</div><div class="s-label">Order Cancelled</div></div>`;
    return;
  }
  const currentIdx = stepIndexForStatus(status);
  track.innerHTML = STEPS.map((s, i) => {
    const cls = i < currentIdx ? "done" : i === currentIdx ? "current" : "";
    const dotContent = i < currentIdx ? "&check;" : i + 1;
    return `<div class="s-step ${cls}"><div class="s-dot">${dotContent}</div><div class="s-label">${s.label}</div></div>`;
  }).join("");
}

async function trackOrder() {
  const ref = document.getElementById("refInput").value.trim();
  const errBox = document.getElementById("errBox");
  const resultEl = document.getElementById("result");
  const loadingEl = document.getElementById("loadingMsg");
  const btn = document.getElementById("trackBtn");

  errBox.classList.remove("show");
  resultEl.classList.remove("show");

  if (!ref) {
    errBox.textContent = "Please enter your order reference number.";
    errBox.classList.add("show");
    return;
  }

  if (TRACK_SUPABASE_URL === "YOUR_SUPABASE_PROJECT_URL") {
    errBox.textContent = "Order tracking is not yet configured. Please contact us directly to check your order status.";
    errBox.classList.add("show");
    return;
  }

  btn.disabled = true;
  loadingEl.classList.add("show");

  try {
    const supabase = window.supabase.createClient(TRACK_SUPABASE_URL, TRACK_SUPABASE_ANON_KEY);
    // Orders are not publicly readable via RLS (see schema.sql) — tracking
    // goes through a dedicated lookup that only returns the limited fields
    // a customer should see. If you haven't deployed a track-order Edge
    // Function, this calls the same public endpoint pattern as other
    // functions; see docs/SETUP.md for the one-line deploy command.
    const res = await fetch(`${TRACK_SUPABASE_URL.replace(/\/$/, "")}/functions/v1/track-order`, {
      method: "POST",
      headers: { "Content-Type": "application/json", apikey: TRACK_SUPABASE_ANON_KEY, Authorization: `Bearer ${TRACK_SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ orderReference: ref }),
    });
    const json = await res.json();

    if (!json.success) {
      errBox.textContent = json.error || "We couldn't find an order with that reference number.";
      errBox.classList.add("show");
      return;
    }

    const order = json.order;
    document.getElementById("resultRef").textContent = order.order_reference;
    renderStatusTrack(order.order_status);

    const etaLine = order.delivery_method === "delivery"
      ? `<div class="detail-row"><span>Estimated Delivery</span><span>${fmtDateTime(order.delivery_time) !== "—" ? fmtDateTime(order.delivery_time) : "25–35 minutes from confirmation"}</span></div>`
      : `<div class="detail-row"><span>Estimated Pickup</span><span>${fmtDateTime(order.pickup_time) !== "—" ? fmtDateTime(order.pickup_time) : "25–35 minutes from confirmation"}</span></div>`;

    document.getElementById("resultDetails").innerHTML = `
      <div class="detail-row"><span>Status</span><span>${escapeHtml((order.order_status || "").replace(/_/g, " "))}</span></div>
      <div class="detail-row"><span>Method</span><span>${order.delivery_method === "delivery" ? "Delivery" : "Pickup"}</span></div>
      ${etaLine}
      <div class="detail-row"><span>Payment Status</span><span>${escapeHtml(order.payment_status)}</span></div>
      <div class="detail-row"><span>Grand Total</span><span>${fmtMoney(order.grand_total)}</span></div>
      <div class="detail-row"><span>Placed</span><span>${fmtDateTime(order.created_at)}</span></div>
    `;

    resultEl.classList.add("show");
  } catch (e) {
    errBox.textContent = "Something went wrong looking up your order. Please try again.";
    errBox.classList.add("show");
  } finally {
    btn.disabled = false;
    loadingEl.classList.remove("show");
  }
}

// Auto-fill and search if the page was opened with ?ref=FM-... in the URL
// (this is how the confirmation page's "Track Order" button links here).
(function () {
  const params = new URLSearchParams(window.location.search);
  const ref = params.get("ref");
  if (ref) {
    document.getElementById("refInput").value = ref;
    trackOrder();
  }
})();
</script>
